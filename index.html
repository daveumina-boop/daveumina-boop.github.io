<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUNdusky</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f9ff;
      color: #1c2333;
    }

    .hero {
      height: 90vh;
      background: url('images/hero-bg.jpg') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.4);
    }

    .hero-content {
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #ff8c1a;
      color: white;
      border-radius: 999px;
      font-weight: bold;
    }

    .section {
      padding: 50px 20px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1000px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    .card-content {
      padding: 20px;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <div class="hero">
    <div class="hero-content">
      <h1>Everything fun in Sandusky</h1>
      <p>Jet skis, boats, nightlife & more</p>
      <a href="water.html" class="btn">Explore Water Activities</a>
    </div>
  </div>

  <!-- FEATURED -->
  <div class="section">
    <h2>What people are doing right now</h2>

    <div class="cards">

      <!-- Jet Ski -->
      <div class="card">
        <img src="images/jetski.jpg">
        <div class="card-content">
          <h3>Jet Ski Rentals</h3>
          <p>Ride Lake Erie your way.</p>
        </div>
      </div>

      <!-- Boat -->
      <div class="card">
        <img src="images/boat.jpg">
        <div class="card-content">
          <h3>Boat Rentals & Sunset Cruises</h3>
          <p>Relax and cruise the water.</p>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
