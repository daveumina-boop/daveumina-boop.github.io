<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Erie Wake Zone</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2c4c;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    .back {
      display: inline-block;
      margin: 20px;
      color: #666;
      font-size: 18px;
    }

    .hero {
      height: 65vh;
      background:
        linear-gradient(to top, rgba(0,0,0,0.55), rgba(0,0,0,0.15)),
        url("images/eriewakezone-hero.jpg") center/cover no-repeat;
      display: flex;
      align-items: flex-end;
      padding: 30px;
      color: white;
    }

    .hero h1 {
      margin: 0;
      font-size: 48px;
    }

    .section {
      padding: 30px 24px 60px;
      max-width: 900px;
      margin: 0 auto;
    }

    h2 {
      font-size: 34px;
      margin-bottom: 15px;
      color: #1f2c4c;
    }

    p {
      font-size: 18px;
      line-height: 1.5;
      color: #2c3553;
    }

    .buttons {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 16px;
      font-weight: bold;
      color: white;
    }

    .book {
      background: #53b96a;
    }

    .map {
      background: #e2a047;
    }

    .call {
      background: #203a8a;
    }

    .gallery {
      margin-top: 40px;
      display: grid;
      gap: 18px;
    }

    .gallery img {
      width: 100%;
      border-radius: 20px;
      display: block;
    }

    .info {
      margin-top: 40px;
      background: white;
      border-radius: 22px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">← Back</a>

  <div class="hero">
    <h1>Erie Wake Zone</h1>
  </div>

  <div class="section">
    <h2>Ride. Cruise. Explore.</h2>
    <p>
      Jet skis, boat rentals, and sunset cruises in Sandusky Bay.
      Whether you want speed or a laid-back cruise, this is where the water experience starts.
    </p>

    <div class="buttons">
      <a href="https://erie-wake-zone.manage.na1.bookingplatform.app/reserve/" target="_blank" rel="noopener noreferrer" class="btn book">Book Now</a>
      <a href="https://www.google.com/maps/search/?api=1&query=701+E+Water+Street+Sandusky+OH+44870" target="_blank" class="btn map">Directions</a>
      <a href="tel:+14199019910" class="btn call">Call</a>
    </div>

    <div class="gallery">
      <img src="images/eriewakezone-main.jpg" alt="Erie Wake Zone main" />
      <img src="images/eriewakezone-ride.jpg" alt="Erie Wake Zone ride" />
      <img src="images/eriewakezone-fleet.jpg" alt="Erie Wake Zone fleet" />
    </div>

    <div class="info">
      <p><strong>701 E. Water Street</strong><br>Sandusky, OH</p>
      <p><strong>Phone:</strong> (419) 901-9910</p>
    </div>
  </div>

</body>
</html>
